    /* ══════════════════════════════════════════════
       ZAKŁADKA: PRACA WARSZAWA (Marcin visits)
    ══════════════════════════════════════════════ */
    function WarszawaTab({marcinSet,setMarcinSet,onRefresh,adminMode}){
      const[toast,setToast]=React.useState(null);
      const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);};

      const planMonths=[];
      for(let m=4;m<=11;m++){
        const firstDay=new Date(2026,m,1),lastDay=new Date(2026,m+1,0),gridStart=startOfWeek(firstDay);
        const cells=[];
        for(let d=new Date(gridStart);d<=lastDay||toDayIndex(d)!==0;d=addDays(d,1)) cells.push(new Date(d));
        while(cells.length%7!==0) cells.push(addDays(cells[cells.length-1],1));
        planMonths.push({label:MONTH_NAMES[m]+" 2026",firstDay,lastDay,cells});
      }

      const affectedWeekKeys=new Set();
      marcinSet.forEach(dk=>{
        const ws=startOfWeek(new Date(dk));
        affectedWeekKeys.add(dateKey(ws));
      });

      const toggleDay=async(dk)=>{
        if(!adminMode) return;
        const isActive=marcinSet.has(dk);
        if(isActive){
          const{error}=await db.from("marcin_visits").delete().eq("date",dk);
          if(error){showToast("Błąd: "+error.message,false);return;}
          setMarcinSet(prev=>{const n=new Set(prev);n.delete(dk);return n;});
        } else {
          const{error}=await db.from("marcin_visits").insert({date:dk});
          if(error){showToast("Błąd: "+error.message,false);return;}
          setMarcinSet(prev=>new Set([...prev,dk]));
        }
        showToast(isActive?"Usunięto":"Dodano przyjazd");
      };

      const visitList=Array.from(marcinSet).sort();

      return(
        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
              <div>
                <h2 className="text-xl font-semibold text-gray-900 flex items-center gap-2 mb-1"><Calendar className="w-6 h-6 text-indigo-500"/> Przyjazdy Marcina do Warszawy</h2>
                <p className="text-sm text-gray-500">Zaznaczone dni → cały tydzień Marcina przechodzi na zmianę <strong>Dzienną (08:00–16:00)</strong></p>
                {!adminMode&&<p className="text-xs text-amber-600 mt-1 font-medium">Włącz tryb admina, aby edytować</p>}
              </div>
              <div className="flex flex-col gap-1 text-sm shrink-0">
                <div className="flex items-center gap-2"><span className="w-5 h-5 rounded-md bg-indigo-500 inline-block"/><span className="text-gray-700">Dzień przyjazdu</span></div>
                <div className="flex items-center gap-2"><span className="w-5 h-5 rounded-md bg-emerald-100 border border-emerald-300 inline-block"/><span className="text-gray-700">Cały tydzień → Dzienna</span></div>
              </div>
            </div>
            {visitList.length>0&&(
              <div className="mt-4 pt-4 border-t border-gray-100">
                <div className="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Zaznaczone dni ({visitList.length})</div>
                <div className="flex flex-wrap gap-1.5">
                  {visitList.map(dk=><span key={dk} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-indigo-100 border border-indigo-200 text-indigo-800 text-xs font-medium">{DAYS_OF_WEEK[toDayIndex(new Date(dk))]}, {formatDate(new Date(dk))}</span>)}
                </div>
              </div>
            )}
          </div>

          {planMonths.map(month=>(
            <div key={month.label} className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
              <h3 className="text-lg font-semibold text-indigo-900 mb-4 flex items-center gap-2"><CalendarDays className="w-5 h-5 text-indigo-400"/> {month.label}</h3>
              <div className="grid grid-cols-7 mb-1">
                {DAYS_SHORT.map(d=><div key={d} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {month.cells.map(date=>{
                  const dk=dateKey(date);
                  const inRange=date>=month.firstDay&&date<=month.lastDay;
                  const isVisit=marcinSet.has(dk);
                  const di=toDayIndex(date),isWknd=di>=5,isToday=dateKey(new Date())===dk;
                  const ws=startOfWeek(date);
                  const isAffectedWeek=affectedWeekKeys.has(dateKey(ws))&&inRange;
                  return(
                    <button key={dk} onClick={()=>inRange&&!isWknd&&toggleDay(dk)} disabled={!inRange||isWknd||!adminMode}
                      className={`relative rounded-lg border text-sm transition-all min-h-[52px] flex flex-col items-center justify-start pt-1 pb-1 px-1
                        ${!inRange?"bg-gray-50 border-gray-100 text-gray-300 cursor-default":
                          isWknd?"bg-red-50 border-red-100 text-red-300 cursor-default":
                          isVisit?"bg-indigo-500 border-indigo-600 text-white shadow-md ring-2 ring-indigo-300":
                          isAffectedWeek?"bg-emerald-50 border-emerald-300 text-emerald-800 hover:bg-emerald-100":
                          adminMode?"bg-white border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 text-gray-700":
                          "bg-white border-gray-200 text-gray-700"}`}>
                      <span className={`text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full
                        ${isToday&&!isVisit?"bg-indigo-600 text-white":isVisit?"bg-white/20 text-white":isWknd&&inRange?"text-red-400":""}`}>{date.getDate()}</span>
                      {isVisit&&<span className="text-[9px] font-semibold mt-0.5 opacity-90">przyjazd</span>}
                      {!isVisit&&isAffectedWeek&&!isWknd&&<span className="text-[9px] text-emerald-600 mt-0.5">Dzienna</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          {toast&&<div className={`fixed bottom-6 right-6 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium ${toast.ok?"bg-emerald-600 text-white":"bg-red-600 text-white"}`}>{toast.ok?<Check className="w-4 h-4"/>:<AlertTriangle className="w-4 h-4"/>}{toast.msg}</div>}
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       ZAKŁADKA: HISTORIA
    ══════════════════════════════════════════════ */
    function HistoriaTab({people,onShiftUpdate}){
      const[history,setHistory]=React.useState([]);
      const[loading,setLoading]=React.useState(true);
      const[confirmRestore,setConfirmRestore]=React.useState(null);
      const[confirmDel,setConfirmDel]=React.useState(null);
      const[toast,setToast]=React.useState(null);
      const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);};

      const fetchHistory=async()=>{
        setLoading(true);
        const{data,error}=await db.from("shift_history").select("id,person_id,date,shift_type,changed_by,note,created_at").order("created_at",{ascending:false}).limit(100);
        setLoading(false);
        if(!error) setHistory(data||[]);
      };

      React.useEffect(()=>{fetchHistory();},[]);

      const handleDelete=async(id)=>{
        const{error}=await db.from("shift_history").delete().eq("id",id);
        if(error) showToast("Błąd usuwania",false);
        else{setHistory(prev=>prev.filter(h=>h.id!==id));showToast("Wpis usunięty");}
        setConfirmDel(null);
      };

      const getPerson=(id)=>people.find(p=>p.id===id)?.name||id;

      const shiftTypeLabel=(t)=>SHIFT_TYPES.find(s=>s.value===t)?.label||t||"—";

      return(
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <div className="flex items-center justify-between mb-6">
            <h2 className="text-xl font-semibold flex items-center gap-2"><History className="w-6 h-6 text-indigo-500"/> Historia zmian</h2>
            <button onClick={fetchHistory} className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-100"><RotateCw className="w-4 h-4"/> Odśwież</button>
          </div>
          {loading?(
            <div className="flex items-center justify-center py-16"><div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>
          ):history.length===0?(
            <div className="text-center py-16 text-gray-400">
              <History className="w-12 h-12 mx-auto mb-3 opacity-30"/>
              <div className="text-sm">Brak wpisów w historii</div>
              <div className="text-xs mt-1">Każda edycja zmiany zostanie tutaj zapisana</div>
            </div>
          ):(
            <div className="space-y-2">
              {history.map((entry,idx)=>{
                const d=new Date(entry.created_at);
                const dateStr=d.toLocaleDateString("pl-PL",{day:"2-digit",month:"2-digit",year:"numeric"});
                const timeStr=d.toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"});
                const st=SHIFT_TYPES.find(s=>s.value===entry.shift_type);
                return(
                  <div key={entry.id} className={`flex items-center justify-between p-4 rounded-xl border ${idx===0?"border-indigo-200 bg-indigo-50/40":"border-gray-200 bg-gray-50/30"}`}>
                    <div className="flex items-center gap-3">
                      <div className={`w-2 h-2 rounded-full ${idx===0?"bg-indigo-500":"bg-gray-300"}`}/>
                      <div>
                        <div className="font-medium text-sm text-gray-800 flex items-center gap-2">
                          <span>{getPerson(entry.person_id)}</span>
                          <span className="text-gray-400">·</span>
                          <span>{entry.date}</span>
                          <span className="text-gray-400">→</span>
                          {st?<span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${st.color}`}>{st.label}</span>:<span className="text-gray-500 text-xs">{entry.shift_type}</span>}
                        </div>
                        <div className="text-xs text-gray-500 mt-0.5">
                          {dateStr} o {timeStr}
                          {entry.note&&<span className="ml-2 italic">"{entry.note}"</span>}
                          {entry.changed_by&&<span className="ml-2 text-gray-400">przez {entry.changed_by}</span>}
                          {idx===0&&<span className="ml-2 text-indigo-600 font-medium">← najnowszy</span>}
                        </div>
                      </div>
                    </div>
                    <button onClick={()=>setConfirmDel(entry.id)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-red-50 border border-red-200 text-red-600 text-xs font-medium hover:bg-red-100"><Trash className="w-3.5 h-3.5"/> Usuń</button>
                  </div>
                );
              })}
            </div>
          )}
          {confirmDel&&<ConfirmModal message="Usunąć ten wpis z historii?" onConfirm={()=>handleDelete(confirmDel)} onCancel={()=>setConfirmDel(null)}/>}
          {toast&&<div className={`fixed bottom-6 right-6 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium ${toast.ok?"bg-emerald-600 text-white":"bg-red-600 text-white"}`}>{toast.ok?<Check className="w-4 h-4"/>:<AlertTriangle className="w-4 h-4"/>}{toast.msg}</div>}
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       ZAKŁADKA: STATYSTYKI MIESIĘCZNE
    ══════════════════════════════════════════════ */
    function StatystykiTab({people,shiftsMap,adminMode}){
      const[selYear,setSelYear]=React.useState(2026);
      const[selMonth,setSelMonth]=React.useState(4);

      const stats=React.useMemo(()=>{
        const firstDay=new Date(selYear,selMonth,1),lastDay=new Date(selYear,selMonth+1,0);
        return people.map(person=>{
          const counts={};
          STAT_COLS.forEach(c=>counts[c.key]=0);
          for(let d=new Date(firstDay);d<=lastDay;d=addDays(d,1)){
            const s=shiftsMap[person.id]?.[dateKey(d)];
            // shift_type="Nocna" (stare dane) → liczy się jako Popołudniowa + Nocka
            const rawType=s?.shift_type||"Wolne";
            const baseType=rawType==="Nocna"?"Popoludniowa":rawType;
            if(counts[baseType]!==undefined) counts[baseType]++;
            else counts["Wolne"]++;
            if(s?.night_duty||rawType==="Nocna") counts["Nocna"]++;
          }
          // Razem = suma zmian bez Wolnych i bez Nocki (Nocka to nakładka, nie osobny dzień)
          const total=STAT_COLS.filter(c=>c.key!=="Wolne"&&c.key!=="Nocna").reduce((a,c)=>a+(counts[c.key]||0),0);
          return{person,counts,total};
        });
      },[people,shiftsMap,selYear,selMonth]);

      const imbalance=React.useMemo(()=>{
        const result={};
        STAT_COLS.filter(c=>c.key!=="Wolne").forEach(col=>{
          const vals=stats.map(s=>s.counts[col.key]);
          if(vals.length>1){const mx=Math.max(...vals),mn=Math.min(...vals);result[col.key]=(mx-mn)>1;}
        });
        return result;
      },[stats]);

      return(
        <div className="space-y-6">
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex flex-wrap items-center gap-3">
            <div className="flex flex-wrap gap-1.5">
              {MONTH_NAMES.slice(4,12).map((m,i)=>{const mi=i+4;return(
                <button key={mi} onClick={()=>setSelMonth(mi)} className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors ${selMonth===mi?"bg-indigo-700 text-white border-indigo-700":"bg-white text-gray-600 border-gray-200 hover:bg-indigo-50"}`}>{m}</button>
              );})}
            </div>
          </div>

          {Object.values(imbalance).some(Boolean)&&(
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2 text-sm text-amber-800">
              <AlertTriangle className="w-4 h-4 mt-0.5 shrink-0"/>
              <span>Nierówny rozkład: {STAT_COLS.filter(c=>imbalance[c.key]).map(c=>c.label).join(", ")}</span>
            </div>
          )}

          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <BarChart3 className="w-5 h-5 text-indigo-500"/>
                <h2 className="font-semibold text-gray-900">Statystyki — {MONTH_NAMES[selMonth]} {selYear}</h2>
              </div>
              {adminMode&&(
                <button onClick={()=>exportRozliczenieXLSX(people,shiftsMap,selYear,selMonth,`${MONTH_NAMES[selMonth]} ${selYear}`)}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-medium hover:bg-emerald-100 transition-colors"
                  title="Eksport rozliczenia do XLSX">
                  <Download className="w-4 h-4"/>Eksport XLSX
                </button>
              )}
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="bg-gray-50">
                    <th className="p-3 text-left border border-gray-200 font-semibold text-gray-700 sticky left-0 bg-gray-50 min-w-[130px]">Pracownik</th>
                    {STAT_COLS.map(col=>(
                      <th key={col.key} className="p-3 text-center border border-gray-200 font-semibold text-gray-700 min-w-[90px]">
                        <div className="flex flex-col items-center gap-1">
                          <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${col.color}`}>{col.label}</span>
                          {imbalance[col.key]&&<AlertTriangle className="w-3 h-3 text-amber-500"/>}
                        </div>
                      </th>
                    ))}
                    <th className="p-3 text-center border border-gray-200 font-semibold text-gray-700 min-w-[70px]">Razem</th>
                  </tr>
                </thead>
                <tbody>
                  {stats.map(({person,counts,total})=>(
                    <tr key={person.id} className="hover:bg-gray-50/40 border-t border-gray-100">
                      <td className="p-3 border border-gray-200 bg-white sticky left-0 font-medium">
                        <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-xs font-bold text-indigo-700">{initials(person.name)}</div>
                          {person.name}
                        </div>
                      </td>
                      {STAT_COLS.map(col=>{
                        const val=counts[col.key]||0;
                        return<td key={col.key} className="p-3 text-center border border-gray-200"><span className={`text-base font-bold ${val===0?"text-gray-300":"text-gray-800"}`}>{val}</span></td>;
                      })}
                      <td className="p-3 text-center border border-gray-200 font-bold text-gray-700">{total}</td>
                    </tr>
                  ))}
                </tbody>
                {stats.length>1&&(
                  <tfoot>
                    <tr className="bg-gray-50 border-t-2 border-gray-300">
                      <td className="p-3 border border-gray-200 font-semibold text-gray-600 sticky left-0 bg-gray-50">Suma</td>
                      {STAT_COLS.map(col=>{
                        const sum=stats.reduce((acc,s)=>acc+(s.counts[col.key]||0),0);
                        return<td key={col.key} className="p-3 text-center border border-gray-200 font-semibold text-gray-700">{sum}</td>;
                      })}
                      <td className="p-3 text-center border border-gray-200 font-bold text-gray-800">{stats.reduce((a,s)=>a+s.total,0)}</td>
                    </tr>
                  </tfoot>
                )}
              </table>
            </div>
          </div>

          {/* Karty rozliczeniowe per-person */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-gray-100 flex items-center gap-2">
              <Clock className="w-5 h-5 text-indigo-500"/>
              <h2 className="font-semibold text-gray-900">Rozliczenie — {MONTH_NAMES[selMonth]} {selYear}</h2>
            </div>
            <div className="p-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
              {stats.map(({person,counts,total})=>{
                const fd=new Date(selYear,selMonth,1),ld=new Date(selYear,selMonth+1,0);
                const daysInMonth=ld.getDate();
                const NOCKA_RATE=75,WEEKEND_RATE=750;
                const nocki=[],weekendy=[];
                for(let d=new Date(fd);d<=ld;d=addDays(d,1)){
                  const dk=dateKey(d);
                  const s=shiftsMap[person.id]?.[dk];
                  if(s){
                    const di=(d.getDay()+6)%7;
                    const dayName=DAYS_OF_WEEK[di];
                    if(s.night_duty||s.shift_type==="Nocna")nocki.push({date:new Date(d),day:dayName});
                    if(s.shift_type==="DyzurWeekendowy")weekendy.push({date:new Date(d),day:dayName});
                  }
                }
                const kwotaNocki=nocki.length*NOCKA_RATE;
                const wkndByWeek={};
                weekendy.forEach(w=>{const wk=dateKey(startOfWeek(w.date));wkndByWeek[wk]=(wkndByWeek[wk]||0)+1;});
                let kwotaWeekend=0;
                const numWeekendow=Object.keys(wkndByWeek).length;
                Object.values(wkndByWeek).forEach(cnt=>{kwotaWeekend+=cnt>=2?WEEKEND_RATE:WEEKEND_RATE/2;});
                const sumaRozliczenia=kwotaNocki+kwotaWeekend;
                const fmtZl=v=>v.toLocaleString("pl-PL",{minimumFractionDigits:2,maximumFractionDigits:2})+" zł";
                return(
                  <details key={person.id} className="bg-gradient-to-br from-gray-50 to-slate-50 rounded-xl border border-gray-200 hover:shadow-md transition-shadow group/card">
                    <summary className="p-4 flex flex-col gap-3 cursor-pointer select-none list-none">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2.5">
                          <div className="w-9 h-9 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-sm font-bold text-indigo-700 shrink-0">{initials(person.name)}</div>
                          <span className="font-semibold text-gray-900 text-sm">{person.name}</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="text-right shrink-0">
                            <span className="text-2xl font-bold text-indigo-600">{total}</span>
                            <div className="text-[10px] text-gray-400 leading-none">dni roboczych</div>
                          </div>
                          <ChevronDown className="w-4 h-4 text-gray-400 transition-transform group-open/card:rotate-180"/>
                        </div>
                      </div>
                      <div className="h-2.5 rounded-full bg-gray-200 overflow-hidden flex" title={`${daysInMonth} dni w miesiącu`}>
                        {STAT_COLS.filter(c=>counts[c.key]>0).map(c=>(
                          <div key={c.key} className={`h-full ${c.bar} first:rounded-l-full last:rounded-r-full`}
                            style={{width:`${(counts[c.key]/daysInMonth)*100}%`}} title={`${c.label}: ${counts[c.key]}`}/>
                        ))}
                      </div>
                      <div className="flex flex-wrap gap-1.5">
                        {STAT_COLS.map(c=>{
                          const v=counts[c.key]||0;
                          if(v===0)return null;
                          return(
                            <span key={c.key} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold ${c.color}`}>
                              {c.label} <span className="font-bold">{v}</span>
                            </span>
                          );
                        })}
                      </div>
                    </summary>
                    <div className="border-t border-gray-200 bg-white rounded-b-xl">
                      {(nocki.length>0||weekendy.length>0)&&(
                        <div className="px-4 py-3 border-b border-gray-100 bg-indigo-50/40">
                          <div className="text-xs font-semibold text-indigo-700 uppercase tracking-wide mb-2">Rozliczenie</div>
                          <div className="grid grid-cols-2 gap-2 text-xs">
                            <div className="flex items-center justify-between bg-white rounded-lg px-3 py-2 border border-gray-100">
                              <span className="text-slate-600">Nocki ({nocki.length} × {NOCKA_RATE} zł)</span>
                              <span className="font-mono font-bold text-slate-800">{fmtZl(kwotaNocki)}</span>
                            </div>
                            <div className="flex items-center justify-between bg-white rounded-lg px-3 py-2 border border-gray-100">
                              <span className="text-emerald-700">Weekendy ({numWeekendow} wknd, {weekendy.length} dni)</span>
                              <span className="font-mono font-bold text-emerald-800">{fmtZl(kwotaWeekend)}</span>
                            </div>
                          </div>
                          <div className="mt-2 flex items-center justify-between bg-indigo-100 rounded-lg px-3 py-2 border border-indigo-200">
                            <span className="font-semibold text-indigo-900 text-xs">SUMA brutto</span>
                            <span className="font-mono font-bold text-indigo-800 text-sm">{fmtZl(sumaRozliczenia)}</span>
                          </div>
                        </div>
                      )}
                      {nocki.length>0&&(
                        <div className="px-4 py-3 border-b border-gray-100">
                          <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-2 flex items-center gap-1.5">
                            <Clock className="w-3.5 h-3.5"/>Nocki ({nocki.length})
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {nocki.map((n,i)=>(
                              <span key={i} className="inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-slate-100 border border-slate-200 text-xs">
                                <span className="font-mono font-semibold text-slate-800">{formatDate(n.date).slice(0,5)}</span>
                                <span className="text-slate-500">{n.day.slice(0,3)}</span>
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                      {weekendy.length>0&&(
                        <div className="px-4 py-3">
                          <div className="text-xs font-semibold text-emerald-700 uppercase tracking-wide mb-2 flex items-center gap-1.5">
                            <PhoneCall className="w-3.5 h-3.5"/>Dyżury weekendowe ({weekendy.length})
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {weekendy.map((w,i)=>(
                              <span key={i} className="inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-emerald-50 border border-emerald-200 text-xs">
                                <span className="font-mono font-semibold text-emerald-800">{formatDate(w.date).slice(0,5)}</span>
                                <span className="text-emerald-600">{w.day.slice(0,3)}</span>
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  </details>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       LOGOWANIE
    ══════════════════════════════════════════════ */
    function LoginScreen(){
      const[email,setEmail]=React.useState("");
      const[pass,setPass]=React.useState("");
      const[error,setError]=React.useState("");
      const[loading,setLoading]=React.useState(false);
      const handleLogin=async()=>{
        if(!email.trim()||!pass.trim()){setError("Wpisz email i hasło");return;}
        setLoading(true);setError("");
        const{error:err}=await db.auth.signInWithPassword({email:email.trim(),password:pass});
        setLoading(false);
        if(err){setError("Nieprawidłowy email lub hasło");setPass("");}
      };
      return(
        <div className="min-h-screen flex items-center justify-center bg-gray-50">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div className="bg-indigo-700 px-6 py-5">
              <div className="text-white font-bold text-xl flex items-center gap-2"><CalendarDays className="w-6 h-6"/> Admin — Grafik v2</div>
              <div className="text-indigo-200 text-sm mt-1">Panel administracyjny</div>
            </div>
            <div className="p-6 space-y-4">
              <div><label className="text-sm font-semibold text-gray-700 block mb-1">Email</label><input type="email" autoFocus value={email} onChange={e=>{setEmail(e.target.value);setError("");}} onKeyDown={e=>{if(e.key==="Enter")handleLogin();}} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="admin@przyklad.pl"/></div>
              <div><label className="text-sm font-semibold text-gray-700 block mb-1">Hasło</label><input type="password" value={pass} onChange={e=>{setPass(e.target.value);setError("");}} onKeyDown={e=>{if(e.key==="Enter")handleLogin();}} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
              {error&&<div className="text-red-600 text-sm">{error}</div>}
            </div>
            <div className="px-6 pb-6">
              <button onClick={handleLogin} disabled={loading} className="w-full py-2.5 rounded-xl bg-indigo-700 text-white font-semibold hover:bg-indigo-800 disabled:opacity-60 flex items-center justify-center gap-2">
                {loading?<><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/> Logowanie…</>:"Zaloguj"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       GŁÓWNA APLIKACJA
    ══════════════════════════════════════════════ */
    function App(){
      const[activeTab,setActiveTab]=React.useState("grafik");
      const[adminMode,setAdminMode]=React.useState(false);
      const[session,setSession]=React.useState(null);
      const[authChecked,setAuthChecked]=React.useState(false);
      const[loading,setLoading]=React.useState(true);
      const[dbError,setDbError]=React.useState(null);
      const[lastUpdated,setLastUpdated]=React.useState(null);
      const[toast,setToast]=React.useState(null);

      const[people,setPeople]=React.useState([]);
      const[shiftsMap,setShiftsMap]=React.useState({});
      const[cyprusMap,setCyprusMap]=React.useState({});
      const[marcinSet,setMarcinSet]=React.useState(new Set());

      React.useEffect(()=>{
        db.auth.getSession().then(({data})=>{setSession(data.session);setAuthChecked(true);});
        const{data:listener}=db.auth.onAuthStateChange((_event,s)=>setSession(s));
        return()=>listener.subscription.unsubscribe();
      },[]);

      const fetchData=async()=>{
        setLoading(true);
        try{
          const[{data:pData,error:pErr},{data:sData,error:sErr},{data:cData,error:cErr},{data:mData,error:mErr}]=await Promise.all([
            db.from("people").select("id,name,legacy_id").eq("active",true).order("legacy_id"),
            db.from("shifts").select("person_id,date,shift_type,night_duty,custom_name,custom_from,custom_to"),
            db.from("cyprus_shifts").select("person_id,date,shift_from,shift_to"),
            db.from("marcin_visits").select("date"),
          ]);
          if(pErr||sErr){setDbError("Błąd ładowania danych.");return;}
          setPeople(pData||[]);
          const sm={};
          (sData||[]).forEach(s=>{if(!sm[s.person_id])sm[s.person_id]={};sm[s.person_id][s.date]=s;});
          setShiftsMap(sm);
          const cm={};
          (cData||[]).forEach(c=>{if(!cm[c.date])cm[c.date]=[];cm[c.date].push(c);});
          setCyprusMap(cm);
          const ms=new Set((mData||[]).map(m=>m.date));
          setMarcinSet(ms);
          setLastUpdated(new Date());
          setDbError(null);
        }catch(e){setDbError("Błąd połączenia z bazą danych.");}
        finally{setLoading(false);}
      };

      React.useEffect(()=>{if(session) fetchData();},[session]);

      const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);};

      const handleShiftSaved=(personId,date,shiftData)=>{
        setShiftsMap(prev=>({...prev,[personId]:{...prev[personId],[date]:shiftData}}));
        setLastUpdated(new Date());
      };

      if(!authChecked) return<Spinner/>;
      if(!session) return<LoginScreen/>;
      if(loading) return<Spinner text="Ładowanie danych…"/>;

      if(dbError&&people.length===0) return(
        <div className="min-h-screen flex items-center justify-center p-8">
          <div className="bg-red-50 border border-red-200 rounded-2xl p-8 max-w-md text-center space-y-4">
            <div className="text-red-600 font-bold">Błąd ładowania danych</div>
            <div className="text-red-700 text-sm">{dbError}</div>
            <button onClick={fetchData} className="px-4 py-2 bg-indigo-700 text-white rounded-xl text-sm font-medium hover:bg-indigo-800">Spróbuj ponownie</button>
          </div>
        </div>
      );

      const TABS=[
        {key:"grafik",     icon:<CalendarDays className="w-5 h-5"/>, label:"Aktualny grafik"},
        {key:"rotacja",    icon:<BarChart3 className="w-5 h-5"/>,    label:"Rotacja kwartalna"},
        {key:"cypr",       icon:<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>, label:"Praca na Cyprze"},
        {key:"warszawa",   icon:<Calendar className="w-5 h-5"/>,     label:"Praca Warszawa"},
        {key:"historia",   icon:<History className="w-5 h-5"/>,      label:"Historia"},
        {key:"statystyki", icon:<BarChart3 className="w-5 h-5"/>,    label:"Statystyki"},
      ];

      return(
        <div className="min-h-screen p-4 md:p-8 font-sans text-gray-800">
          {toast&&<div className={`fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-xl text-white font-medium text-sm ${toast.ok?"bg-emerald-600":"bg-red-600"}`}>{toast.msg}</div>}

          <div className="max-w-7xl mx-auto">
            {/* Header */}
            <header className="mb-6 flex flex-row items-center justify-between gap-4">
              <div>
                <h1 className="text-xl md:text-3xl font-bold text-gray-900 flex items-center gap-2 md:gap-3 mb-1">
                  <CalendarDays className="w-6 h-6 md:w-8 md:h-8 text-indigo-700"/>
                  <span className="hidden md:inline">Admin — Grafik v2</span>
                  <span className="md:hidden">Admin v2</span>
                </h1>
                {lastUpdated&&<p className="text-gray-400 text-xs">Akt.: {lastUpdated.toLocaleTimeString("pl-PL")}</p>}
              </div>
              <div className="flex flex-wrap gap-2 items-center">
                <button onClick={fetchData} className="flex items-center gap-1.5 px-2 md:px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-100">
                  <RefreshCw className="w-4 h-4"/><span className="hidden md:inline">Odśwież</span>
                </button>
                <button onClick={()=>setAdminMode(v=>!v)}
                  className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-xl font-semibold text-sm shadow-sm ${adminMode?"bg-red-600 text-white hover:bg-red-700":"bg-indigo-700 text-white hover:bg-indigo-800"}`}>
                  <Pencil className="w-4 h-4"/><span className="hidden md:inline">{adminMode?"Wyłącz tryb admina":"Tryb admina"}</span>
                </button>
                <button onClick={()=>db.auth.signOut()} className="flex items-center gap-1.5 px-2 md:px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-100">
                  <User className="w-4 h-4"/><span className="hidden md:inline">Wyloguj</span>
                </button>
              </div>
            </header>

            {adminMode&&(
              <div className="bg-amber-50 border border-amber-300 rounded-xl p-4 mb-6 flex items-center gap-3 text-amber-900 shadow-sm">
                <Pencil className="w-5 h-5 text-amber-600 shrink-0"/>
                <div className="text-sm"><strong className="text-amber-800">Tryb Administratora aktywny.</strong> Kliknij komórkę dnia aby edytować. Zmiany zapisują się automatycznie w Supabase.</div>
              </div>
            )}

            {/* Taby */}
            <div className="flex gap-1 md:gap-4 mb-6 border-b border-gray-200 overflow-x-auto">
              {TABS.map(tab=>(
                <button key={tab.key} onClick={()=>setActiveTab(tab.key)} title={tab.label}
                  className={`pb-4 px-3 md:px-2 font-medium flex items-center gap-2 transition-colors whitespace-nowrap shrink-0 ${activeTab===tab.key?"border-b-2 border-indigo-700 text-indigo-700":"text-gray-500 hover:text-gray-700"}`}>
                  {tab.icon}
                  <span className="hidden md:inline">{tab.label}</span>
                </button>
              ))}
            </div>

            {activeTab==="grafik"     &&<GrafikTab people={people} shiftsMap={shiftsMap} onShiftSaved={handleShiftSaved} adminMode={adminMode}/>}
            {activeTab==="rotacja"    &&<RotacjaTab people={people}/>}
            {activeTab==="cypr"       &&<CyprTab people={people} cyprusMap={cyprusMap} setCyprusMap={setCyprusMap} onRefresh={fetchData} adminMode={adminMode}/>}
            {activeTab==="warszawa"   &&<WarszawaTab marcinSet={marcinSet} setMarcinSet={setMarcinSet} onRefresh={fetchData} adminMode={adminMode}/>}
            {activeTab==="historia"   &&<HistoriaTab people={people} onShiftUpdate={fetchData}/>}
            {activeTab==="statystyki" &&<StatystykiTab people={people} shiftsMap={shiftsMap} adminMode={adminMode}/>}
          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
