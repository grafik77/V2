    const Download=({className})=><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    /* ── export XLSX rozliczenia ── */
    function exportRozliczenieXLSX(people, shiftsMap, year, month, monthName) {
      const NOCKA_RATE=75, WEEKEND_RATE=750;
      const fd=new Date(year,month,1), ld=new Date(year,month+1,0);
      const fmtD=d=>`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
      const DOW=["Poniedziałek","Wtorek","Środa","Czwartek","Piątek","Sobota","Niedziela"];
      const dayIdx=d=>(d.getDay()+6)%7;

      const PERSON_COLORS=[
        {fill:"DDEEFF",font:"1F3864"},{fill:"DDFFEE",font:"1A4731"},
        {fill:"FFF0DD",font:"7B4200"},{fill:"F0DDFF",font:"4B1C82"},
      ];

      const countWeekends=(days)=>{
        const byWeek={};
        days.forEach(d=>{const wk=dateKey(startOfWeek(d));byWeek[wk]=(byWeek[wk]||0)+1;});
        let total=0;
        Object.values(byWeek).forEach(cnt=>{total+=cnt>=2?WEEKEND_RATE:WEEKEND_RATE/2;});
        return total;
      };

      const data=people.map((person,idx)=>{
        const nocki=[],weekendy=[];
        for(let d=new Date(fd);d<=ld;d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1)){
          const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          const s=shiftsMap[person.id]?.[dk];
          if(!s)continue;
          if(s.night_duty||s.shift_type==="Nocna")nocki.push(new Date(d));
          if(s.shift_type==="DyzurWeekendowy")weekendy.push(new Date(d));
        }
        const kwW=countWeekends(weekendy);
        return{name:person.name,nocki,weekendy,kwN:nocki.length*NOCKA_RATE,kwW,suma:nocki.length*NOCKA_RATE+kwW,colorIdx:idx%PERSON_COLORS.length};
      });

      const wb=XLSX.utils.book_new();
      const wsData=[];
      const merges=[];
      const colWidths=[{wch:30},{wch:14},{wch:14},{wch:18},{wch:18},{wch:16}];

      const s=(v,opts={})=>({v,...opts});
      const fill=(c)=>({patternType:"solid",fgColor:{rgb:c}});
      const font=(c,b=false,sz=11)=>({color:{rgb:c},bold:b,sz});
      const border={top:{style:"thin",color:{rgb:"D0D0D0"}},bottom:{style:"thin",color:{rgb:"D0D0D0"}},left:{style:"thin",color:{rgb:"D0D0D0"}},right:{style:"thin",color:{rgb:"D0D0D0"}}};

      // Row 1: Title
      wsData.push([
        {v:`ROZLICZENIE NOCEK I DYZUROW WEEKENDOWYCH — ${monthName.toUpperCase()}`,s:{fill:fill("4472C4"),font:font("FFFFFF",true,13),alignment:{horizontal:"center",vertical:"center"},border}},
        {v:"",s:{fill:fill("4472C4"),border}},{v:"",s:{fill:fill("4472C4"),border}},
        {v:"",s:{fill:fill("4472C4"),border}},{v:"",s:{fill:fill("4472C4"),border}},{v:"",s:{fill:fill("4472C4"),border}},
      ]);
      merges.push({s:{r:0,c:0},e:{r:0,c:5}});

      // Row 2: Rates
      wsData.push([
        {v:`Stawka za nocek:  ${NOCKA_RATE} zl [brutto]`,s:{fill:fill("DAE3F3"),font:font("1F3864",true),border}},
        {v:"",s:{fill:fill("DAE3F3"),border}},{v:"",s:{fill:fill("DAE3F3"),border}},
        {v:`Stawka za dyzur weekendowy:  ${WEEKEND_RATE} zl [brutto]`,s:{fill:fill("F4E6FF"),font:font("4B1C82",true),border}},
        {v:"",s:{fill:fill("F4E6FF"),border}},{v:"",s:{fill:fill("F4E6FF"),border}},
      ]);
      merges.push({s:{r:1,c:0},e:{r:1,c:2}});
      merges.push({s:{r:1,c:3},e:{r:1,c:5}});

      // Row 3: Headers
      const hdrS={fill:fill("D9E1F2"),font:font("1F3864",true),border,alignment:{horizontal:"center"}};
      wsData.push([
        {v:"Pracownik",s:{...hdrS,alignment:{horizontal:"left"}}},
        {v:"Liczba nocek",s:hdrS},{v:"Kwota nocki",s:hdrS},
        {v:"Liczba weekendow",s:hdrS},{v:"Kwota weekendow",s:hdrS},{v:"SUMA [brutto]",s:hdrS},
      ]);

      // Data rows
      data.forEach((p,i)=>{
        const nameBg=i%2===0?"FFFFFF":"F2F2F2";
        wsData.push([
          {v:p.name,s:{fill:fill(nameBg),font:font("000000",true),border}},
          {v:p.nocki.length,s:{fill:fill("DAE3F3"),font:font("1F3864"),border,alignment:{horizontal:"center"}}},
          {v:p.kwN,s:{fill:fill("DAE3F3"),font:font("1F3864"),border,numFmt:'#,##0.00" zł"',alignment:{horizontal:"center"}}},
          {v:p.weekendy.length,s:{fill:fill("F4E6FF"),font:font("4B1C82"),border,alignment:{horizontal:"center"}}},
          {v:p.kwW,s:{fill:fill("F4E6FF"),font:font("4B1C82"),border,numFmt:'#,##0.00" zł"',alignment:{horizontal:"center"}}},
          {v:p.suma,s:{fill:fill("E2EFDA"),font:font("375623",true),border,numFmt:'#,##0.00" zł"',alignment:{horizontal:"center"}}},
        ]);
      });

      // Sum row
      const tN=data.reduce((a,p)=>a+p.nocki.length,0);
      const tKN=data.reduce((a,p)=>a+p.kwN,0);
      const tW=data.reduce((a,p)=>a+p.weekendy.length,0);
      const tKW=data.reduce((a,p)=>a+p.kwW,0);
      const tS=data.reduce((a,p)=>a+p.suma,0);
      const sumS={fill:fill("E2EFDA"),font:font("375623",true),border,alignment:{horizontal:"center"}};
      wsData.push([
        {v:"SUMA MIESIACA",s:{...sumS,alignment:{horizontal:"left"}}},
        {v:tN,s:sumS},{v:tKN,s:{...sumS,numFmt:'#,##0.00" zł"'}},
        {v:tW,s:sumS},{v:tKW,s:{...sumS,numFmt:'#,##0.00" zł"'}},
        {v:tS,s:{...sumS,numFmt:'#,##0.00" zł"'}},
      ]);

      // Empty row
      wsData.push([{v:""},{v:""},{v:""},{v:""},{v:""},{v:""}]);

      // Nocki details header
      const nockiHdrRow=wsData.length;
      wsData.push([
        {v:"SZCZEGOLY NOCEK",s:{fill:fill("BDD7EE"),font:font("1F3864",true),border}},
        {v:"",s:{fill:fill("BDD7EE"),border}},{v:"",s:{fill:fill("BDD7EE"),border}},
        {v:"",s:{fill:fill("BDD7EE"),border}},{v:"",s:{fill:fill("BDD7EE"),border}},{v:"",s:{fill:fill("BDD7EE"),border}},
      ]);
      merges.push({s:{r:nockiHdrRow,c:0},e:{r:nockiHdrRow,c:5}});

      wsData.push([
        {v:"Data",s:hdrS},{v:"Dzien tygodnia",s:hdrS},{v:"Pracownik",s:hdrS},
        {v:"",s:{border}},{v:"",s:{border}},{v:"",s:{border}},
      ]);

      data.forEach(p=>{
        const pc=PERSON_COLORS[p.colorIdx];
        p.nocki.sort((a,b)=>a-b).forEach(d=>{
          wsData.push([
            {v:fmtD(d),s:{fill:fill(pc.fill),font:font(pc.font),border}},
            {v:DOW[dayIdx(d)],s:{fill:fill(pc.fill),font:font(pc.font),border}},
            {v:p.name,s:{fill:fill(pc.fill),font:font(pc.font,true),border}},
            {v:"",s:{border}},{v:"",s:{border}},{v:"",s:{border}},
          ]);
        });
      });

      // Empty row
      wsData.push([{v:""},{v:""},{v:""},{v:""},{v:""},{v:""}]);

      // Weekend details header
      const wkndHdrRow=wsData.length;
      wsData.push([
        {v:"SZCZEGOLY DYZUROW WEEKENDOWYCH",s:{fill:fill("E8D5F5"),font:font("4B1C82",true),border}},
        {v:"",s:{fill:fill("E8D5F5"),border}},{v:"",s:{fill:fill("E8D5F5"),border}},
        {v:"",s:{fill:fill("E8D5F5"),border}},{v:"",s:{fill:fill("E8D5F5"),border}},{v:"",s:{fill:fill("E8D5F5"),border}},
      ]);
      merges.push({s:{r:wkndHdrRow,c:0},e:{r:wkndHdrRow,c:5}});

      wsData.push([
        {v:"Data",s:hdrS},{v:"Dzien tygodnia",s:hdrS},{v:"Pracownik",s:hdrS},
        {v:"",s:{border}},{v:"",s:{border}},{v:"",s:{border}},
      ]);

      data.forEach(p=>{
        const pc=PERSON_COLORS[p.colorIdx];
        const sorted=p.weekendy.sort((a,b)=>a-b);
        let i=0;
        while(i<sorted.length){
          const curr=sorted[i],next=sorted[i+1];
          if(next&&(next-curr)===86400000&&dayIdx(curr)===5){
            wsData.push([
              {v:`${fmtD(curr)} – ${fmtD(next)}`,s:{fill:fill(pc.fill),font:font(pc.font),border}},
              {v:"Sobota – Niedziela",s:{fill:fill(pc.fill),font:font(pc.font),border}},
              {v:p.name,s:{fill:fill(pc.fill),font:font(pc.font,true),border}},
              {v:"",s:{border}},{v:"",s:{border}},{v:"",s:{border}},
            ]);
            i+=2;
          }else{
            wsData.push([
              {v:fmtD(curr),s:{fill:fill(pc.fill),font:font(pc.font),border}},
              {v:DOW[dayIdx(curr)],s:{fill:fill(pc.fill),font:font(pc.font),border}},
              {v:p.name,s:{fill:fill(pc.fill),font:font(pc.font,true),border}},
              {v:"",s:{border}},{v:"",s:{border}},{v:"",s:{border}},
            ]);
            i++;
          }
        }
      });

      const ws=XLSX.utils.aoa_to_sheet(wsData);
      ws["!merges"]=merges;
      ws["!cols"]=colWidths;
      const rows=[];for(let i=0;i<wsData.length;i++)rows.push({hpt:i===0?28:20});
      ws["!rows"]=rows;

      XLSX.utils.book_append_sheet(wb,ws,monthName);
      XLSX.writeFile(wb,`Rozliczenie Nocek_Weekenow - ${monthName}.xlsx`);
    }

    /* ── stałe ── */
    const DAYS_OF_WEEK=["Poniedziałek","Wtorek","Środa","Czwartek","Piątek","Sobota","Niedziela"];
    const DAYS_SHORT=["Pon","Wt","Śr","Czw","Pt","Sob","Nd"];
    const MONTH_NAMES=["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
    const DISPLAY_START=new Date(2026,4,1);
    const DISPLAY_END=new Date(2026,11,31);
    const SCHEDULE_START=new Date(2026,2,30);
    const WEEKS=13;

    /* rotacja kwartalna — takie same jak w admin.html */
    const DEFAULT_PEOPLE_IDS=["p1","p2","p3","p4"];
    const WEEKEND_BY_WEEK=["p1","p2","p3","p4","p1","p2","p3","p4","p1","p2","p3","p4","p1"];
    const NIGHT_BY_WEEK  =["p2","p3","p4","p1","p2","p3","p4","p1","p2","p3","p4","p1","p2"];
    const PORANNA_BY_WEEK=["p3","p4","p1","p2","p3","p4","p1","p2","p3","p4","p1","p2","p3"];

    const SHIFT_TYPES=[
      {value:"Poranna",        label:"Poranna",         hours:"06:30 – 14:30", color:"bg-blue-50 text-blue-800 border-blue-200"},
      {value:"Dzienna",        label:"Dzienna",          hours:"08:00 – 16:00", color:"bg-emerald-50 text-emerald-800 border-emerald-200"},
      {value:"Popoludniowa",   label:"Popołudniowa",     hours:"13:30 – 21:30", color:"bg-orange-50 text-orange-900 border-orange-300"},
      {value:"DyzurWeekendowy",label:"Dyżur Weekendowy", hours:"",              color:"bg-emerald-700 text-white border-emerald-600"},
      {value:"Duty24h",        label:"Dyżur 24h",        hours:"całą dobę",     color:"bg-amber-50 text-amber-900 border-amber-300"},
      {value:"Urlop",          label:"Urlop",            hours:"",              color:"bg-yellow-50 text-yellow-800 border-yellow-300"},
      {value:"Wolne",          label:"Wolne",            hours:"",              color:"bg-gray-50 text-gray-400 border-gray-200"},
      {value:"Niestandardowa", label:"Niestandardowa",   hours:"",              color:"bg-violet-50 text-violet-800 border-violet-300"},
    ];
    const STAT_COLS=[
      {key:"Poranna",         label:"Poranna",        color:"bg-blue-100 text-blue-800",      bar:"bg-blue-400"},
      {key:"Dzienna",         label:"Dzienna",         color:"bg-emerald-100 text-emerald-800", bar:"bg-emerald-400"},
      {key:"Popoludniowa",    label:"Popołudniowa",    color:"bg-orange-100 text-orange-800",  bar:"bg-orange-400"},
      {key:"Nocna",           label:"Nocka",           color:"bg-slate-700 text-slate-100",    bar:"bg-slate-700"},
      {key:"DyzurWeekendowy", label:"Dyżur Weekend",   color:"bg-emerald-700 text-white",      bar:"bg-emerald-700"},
      {key:"Duty24h",         label:"Dyżur 24h",       color:"bg-amber-100 text-amber-800",    bar:"bg-amber-400"},
      {key:"Urlop",           label:"Urlop",           color:"bg-yellow-100 text-yellow-800",  bar:"bg-yellow-400"},
      {key:"Wolne",           label:"Wolne",           color:"bg-gray-100 text-gray-500",      bar:"bg-gray-300"},
    ];

    const CUSTOM_COLORS=[
      {bg:"bg-violet-100",border:"border-violet-400",text:"text-violet-900"},
      {bg:"bg-pink-100",  border:"border-pink-400",  text:"text-pink-900"},
      {bg:"bg-cyan-100",  border:"border-cyan-400",  text:"text-cyan-900"},
      {bg:"bg-lime-100",  border:"border-lime-400",  text:"text-lime-900"},
      {bg:"bg-rose-100",  border:"border-rose-400",  text:"text-rose-900"},
    ];

    /* ── helpers ── */
    function dateKey(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;}
    function addDays(date,days){const d=new Date(date);d.setDate(d.getDate()+days);return d;}
    function startOfWeek(date){const d=new Date(date),jsDay=d.getDay();d.setDate(d.getDate()+(jsDay===0?-6:1-jsDay));d.setHours(0,0,0,0);return d;}
    function formatDate(date){return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${date.getFullYear()}`;}
    function toDayIndex(date){return (date.getDay()+6)%7;}
    function initials(name){const p=name.split(" ").filter(Boolean);return ((p[0]?.[0]??'?')+(p[1]?.[0]??'')).toUpperCase();}
    function weekIndexOf(date){return Math.floor((startOfWeek(date).getTime()-SCHEDULE_START.getTime())/(7*24*3600*1000));}

    function Spinner({text}){return <div className="min-h-screen flex items-center justify-center"><div className="text-center space-y-3"><div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>{text&&<div className="text-gray-500 text-sm">{text}</div>}</div></div>;}

    /* ── renderDayCell — identyczny styl jak w grafiku pracownika ── */
    function NightBadge(){
      return(
        <div className="bg-slate-800 text-slate-100 text-[10px] py-1 w-full border-t border-slate-700 flex flex-col items-center justify-center">
          <span className="flex items-center gap-1 font-semibold text-amber-300"><Clock className="w-3 h-3"/>NOCKA</span>
          <span className="opacity-90 font-mono">21:30–06:30</span>
        </div>
      );
    }

    /* shiftTypeToInfo — mapuje nowy enum na stary format dla renderowania */
    function shiftTypeToInfo(s){
      if(!s) return {shift:"Wolne",night:false,weekend:false,duty24h:false,custom:null,dayIndex:0,isWeekend:false};
      const di=s._dayIndex||0,isWknd=di>=5,night=!!s.night_duty;
      switch(s.shift_type){
        case "Poranna":         return {shift:"Poranna",       night,weekend:false,duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
        case "Dzienna":         return {shift:"Dzienna",        night,weekend:false,duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
        case "Popoludniowa":    return {shift:"Popołudniowa",   night,weekend:false,duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
        case "DyzurWeekendowy": return {shift:"Dzienna",        night:false,weekend:true, duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
        case "Duty24h":         return {shift:"Dzienna",        night:false,weekend:false,duty24h:true, custom:null,dayIndex:di,isWeekend:isWknd};
        case "Urlop":           return {shift:"Urlop",          night:false,weekend:false,duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
        case "Niestandardowa":  return {shift:"Niestandardowa", night,weekend:false,duty24h:false,
          custom:{name:s.custom_name||"Niestandardowa",from:s.custom_from?.slice(0,5)||"",to:s.custom_to?.slice(0,5)||"",colorIdx:0},dayIndex:di,isWeekend:isWknd};
        default:                return {shift:"Wolne",          night:false,weekend:false,duty24h:false,custom:null,dayIndex:di,isWeekend:isWknd};
      }
    }

    function renderDayCell(info){
      const {shift,night,weekend,duty24h,custom,isWeekend}=info;
      if(weekend)return{
        style:"bg-emerald-50 text-emerald-900 border-emerald-400 font-semibold shadow-sm",
        content:<div className="flex flex-col items-center justify-center gap-1 text-center w-full h-full p-1"><span className="text-emerald-700 flex items-center justify-center gap-1"><PhoneCall className="w-4 h-4"/>Dyżur weekendowy</span></div>,
      };
      if(duty24h)return{
        style:"bg-amber-50 text-amber-900 border-amber-400 font-semibold shadow-sm",
        content:<div className="flex flex-col items-center justify-center gap-1 text-center w-full h-full p-1"><span className="text-amber-700 flex items-center justify-center gap-1"><PhoneCall className="w-4 h-4"/>Dyżur 24h</span><span className="text-[10px] text-amber-600 font-normal">do odebrania</span></div>,
      };
      if(shift==="Urlop")return{style:"bg-yellow-50 text-yellow-800 border-yellow-300",content:<div className="flex items-center justify-center w-full h-full p-1 min-h-[46px]"><span className="font-semibold">Urlop</span></div>};
      if(shift==="Niestandardowa"&&custom){
        const c=CUSTOM_COLORS[custom.colorIdx??0];
        return{style:`${c.bg} ${c.text} ${c.border}`,content:<div className="flex flex-col items-center justify-center w-full h-full p-1 min-h-[46px] min-w-0 overflow-hidden"><span className="font-semibold text-xs line-clamp-2 break-words text-center leading-tight w-full">{custom.name||"Niestandardowa"}</span>{custom.from&&<span className="text-xs opacity-80 whitespace-nowrap">{custom.from} – {custom.to}</span>}</div>};
      }
      if(isWeekend&&shift==="Wolne")return{style:"bg-gray-50 text-gray-400 border-dashed border-gray-200",content:<div className="flex items-center justify-center w-full h-full p-1 min-h-[46px]">Wolne</div>};
      let shiftLabel="",style="";
      if(shift==="Poranna")          {shiftLabel="06:30 – 14:30";style="bg-blue-50 text-blue-800 border-blue-200";}
      else if(shift==="Dzienna")     {shiftLabel="08:00 – 16:00";style="bg-emerald-50 text-emerald-800 border-emerald-200";}
      else if(shift==="Popołudniowa"){shiftLabel="13:30 – 21:30";style="bg-orange-50 text-orange-900 border-orange-300";}
      else                           {shiftLabel="Wolne";style="bg-gray-50 text-gray-400 border-dashed border-gray-200";}
      if(night)return{
        style:`${style} overflow-hidden shadow-sm flex flex-col p-0`,
        content:<div className="flex flex-col w-full h-full"><div className="flex-1 flex flex-col items-center justify-center p-1 w-full min-h-[36px]"><span className="text-xs font-semibold">{shiftLabel}</span></div><NightBadge/></div>,
      };
      return{style,content:<div className="flex flex-col items-center justify-center w-full h-full p-1 min-h-[46px]"><span className="font-medium text-xs">{shiftLabel}</span></div>};
    }

    /* ── Modals ── */
    function ConfirmModal({message,onConfirm,onCancel}){
      return(
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6 space-y-4">
            <div className="text-gray-800 font-semibold">{message}</div>
            <div className="flex gap-3">
              <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Anuluj</button>
              <button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700">Potwierdź</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Modal edycji zmiany ── */
    function EditShiftModal({cells,person,date,currentShift,onClose,onSave}){
      const initType=currentShift?.shift_type==="Nocna"?"Popoludniowa":(currentShift?.shift_type||"Dzienna");
      const[shiftType,setShiftType]=React.useState(initType);
      const[nightDuty,setNightDuty]=React.useState(currentShift?.shift_type==="Nocna"?true:!!currentShift?.night_duty);
      const[customName,setCustomName]=React.useState(currentShift?.custom_name||"");
      const[customFrom,setCustomFrom]=React.useState(currentShift?.custom_from?.slice(0,5)||"");
      const[customTo,setCustomTo]=React.useState(currentShift?.custom_to?.slice(0,5)||"");
      const[saving,setSaving]=React.useState(false);
      const canHaveNight=["Poranna","Dzienna","Popoludniowa","Niestandardowa"].includes(shiftType);
      const handleSave=async()=>{
        setSaving(true);
        await onSave({shift_type:shiftType,night_duty:canHaveNight?nightDuty:false,custom_name:customName||null,custom_from:customFrom||null,custom_to:customTo||null});
        setSaving(false);
      };
      return(
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden" onClick={e=>e.stopPropagation()}>
            <div className="bg-indigo-700 px-5 py-4">
              {cells&&cells.length>1?(
                <>
                  <div className="text-white font-bold text-lg">Edytujesz {cells.length} zmian</div>
                  <div className="text-indigo-200 text-sm">Wybrana zmiana zostanie zastosowana do wszystkich zaznaczonych komórek</div>
                </>
              ):(
                <>
                  <div className="text-white font-bold text-lg">{person?.name}</div>
                  <div className="text-indigo-200 text-sm">{date?DAYS_OF_WEEK[toDayIndex(new Date(date+"T12:00:00"))]+", "+formatDate(new Date(date+"T12:00:00")):""}</div>
                </>
              )}
            </div>
            <div className="p-5 space-y-4 max-h-[65vh] overflow-y-auto">
              <div className="text-sm font-semibold text-gray-700">Typ zmiany</div>
              <div className="grid grid-cols-2 gap-2">
                {SHIFT_TYPES.map(s=>(
                  <button key={s.value} onClick={()=>setShiftType(s.value)}
                    className={`px-3 py-2.5 rounded-xl border-2 text-left transition-all ${shiftType===s.value?`${s.color} ring-2 ring-indigo-400 ring-offset-1`:"bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100"}`}>
                    <div className="font-semibold text-sm">{s.label}</div>
                    {s.hours&&<div className="text-xs opacity-70 mt-0.5">{s.hours}</div>}
                  </button>
                ))}
              </div>
              {canHaveNight&&(
                <button onClick={()=>setNightDuty(v=>!v)}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl border-2 transition-all ${nightDuty?"bg-slate-800 border-slate-700 text-slate-100":"bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100"}`}>
                  <div className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ${nightDuty?"bg-amber-400 border-amber-400":"border-gray-400"}`}>
                    {nightDuty&&<Check className="w-3 h-3 text-slate-900"/>}
                  </div>
                  <div className="text-left">
                    <div className="font-semibold text-sm">Dyżur nocny</div>
                    <div className={`text-xs mt-0.5 ${nightDuty?"text-slate-300":"text-gray-400"}`}>21:30 – 06:30 · liczone jako Nocka w statystykach</div>
                  </div>
                </button>
              )}
              {shiftType==="Niestandardowa"&&(
                <div className="space-y-3 bg-violet-50 rounded-xl p-4 border border-violet-200">
                  <div><label className="text-xs font-semibold text-gray-600 block mb-1">Nazwa</label><input value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="np. Szkolenie" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/></div>
                  <div className="flex gap-3">
                    <div className="flex-1"><label className="text-xs font-semibold text-gray-600 block mb-1">Od</label><input type="time" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} className="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/></div>
                    <div className="flex-1"><label className="text-xs font-semibold text-gray-600 block mb-1">Do</label><input type="time" value={customTo} onChange={e=>setCustomTo(e.target.value)} className="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/></div>
                  </div>
                </div>
              )}
            </div>
            <div className="px-5 pb-5 flex gap-3">
              <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Anuluj</button>
              <button onClick={handleSave} disabled={saving} className="flex-1 py-2.5 rounded-xl bg-indigo-700 text-white font-semibold hover:bg-indigo-800 disabled:opacity-60 flex items-center justify-center gap-2">
                {saving?<div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>:<Check className="w-4 h-4"/>}Zapisz
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       ZAKŁADKA: AKTUALNY GRAFIK
    ══════════════════════════════════════════════ */
    function GrafikTab({people,shiftsMap,onShiftSaved,adminMode}){
      const[activeMonth,setActiveMonth]=React.useState(()=>{const t=new Date();const m=t.getMonth();return(t.getFullYear()===2026&&m>=4&&m<=11)?`2026-${m}`:"2026-4";});
      const[subView,setSubView]=React.useState("tygodniowo");
      const[editModal,setEditModal]=React.useState(null);   // {cells:[{person,date}], currentShift}
      const[selectedDay,setSelectedDay]=React.useState(null);
      const[collapsedWeeks,setCollapsedWeeks]=React.useState(null);
      const[toast,setToast]=React.useState(null);
      // multi-select: Set kluczy "personId|dateKey", + indeks tygodnia żeby czyścić przy zmianie
      const[selection,setSelection]=React.useState(new Set());
      const[selectionWeek,setSelectionWeek]=React.useState(null);

      const allMonths=[];
      for(let m=4;m<=11;m++) allMonths.push({key:`2026-${m}`,label:`${MONTH_NAMES[m]} 2026`,year:2026,month:m});

      const today=new Date();today.setHours(0,0,0,0);
      const todayKey=dateKey(today);
      const[cwYear,cwMonth]=activeMonth.split("-").map(Number);

      const weeklyBlocks=React.useMemo(()=>{
        const blocks=[];
        for(let ws=new Date(startOfWeek(DISPLAY_START));ws<=DISPLAY_END;ws=addDays(ws,7)){
          blocks.push({weekStart:new Date(ws),weekEnd:addDays(ws,6),days:Array.from({length:7},(_,i)=>addDays(ws,i))});
        }
        return blocks;
      },[]);

      const monthWeeks=weeklyBlocks.filter(b=>b.days.some(d=>d.getFullYear()===cwYear&&d.getMonth()===cwMonth));
      const currentWeekIdx=weeklyBlocks.findIndex(b=>b.days.some(d=>dateKey(d)===todayKey));

      const cwState=React.useMemo(()=>{
        if(collapsedWeeks!==null) return collapsedWeeks;
        const init={};
        weeklyBlocks.forEach((_,i)=>{if(i!==currentWeekIdx)init[i]=true;});
        return init;
      },[weeklyBlocks,currentWeekIdx,collapsedWeeks]);

      /* Kalendarz miesięczny dla widoku dziennego */
      const firstDay=new Date(2026,cwMonth,1);
      const lastDay=new Date(2026,cwMonth+1,0);
      const gridStart=startOfWeek(firstDay);
      const calCells=[];
      for(let d=new Date(gridStart);d<=lastDay||toDayIndex(d)!==0;d=addDays(d,1)) calCells.push(new Date(d));
      while(calCells.length%7!==0) calCells.push(addDays(calCells[calCells.length-1],1));

      const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);};

      const selKey=(personId,dk)=>`${personId}|${dk}`;

      const toggleCell=(person,date,weekIdx)=>{
        if(!adminMode) return;
        const dk=dateKey(date);
        const k=selKey(person.id,dk);
        setSelection(prev=>{
          // jeśli inny tydzień — wyczyść i zacznij od nowa
          if(selectionWeek!==null&&selectionWeek!==weekIdx){
            setSelectionWeek(weekIdx);
            return new Set([k]);
          }
          setSelectionWeek(weekIdx);
          const n=new Set(prev);
          if(n.has(k)) n.delete(k); else n.add(k);
          return n;
        });
      };

      const clearSelection=()=>{setSelection(new Set());setSelectionWeek(null);};

      const openMultiEdit=()=>{
        if(selection.size===0) return;
        const cells=[...selection].map(k=>{
          const[pid,dk]=k.split("|");
          const person=people.find(p=>p.id===pid);
          return{person,date:dk};
        });
        // currentShift = pierwsza zaznaczona komórka (podpowiedź)
        const first=cells[0];
        const currentShift=shiftsMap[first.person.id]?.[first.date]||null;
        setEditModal({cells,currentShift});
      };

      const handleSaveMulti=async({shift_type,night_duty,custom_name,custom_from,custom_to})=>{
        const{cells}=editModal;
        const upsertRows=cells.map(({person,date})=>({person_id:person.id,date,shift_type,night_duty,custom_name:custom_name||null,custom_from:custom_from||null,custom_to:custom_to||null}));
        const{error}=await db.from("shifts").upsert(upsertRows,{onConflict:"person_id,date"});
        if(error){showToast("Błąd zapisu: "+error.message,false);return;}
        const histRows=cells.map(({person,date})=>({person_id:person.id,date,shift_type,note:night_duty?"+ dyżur nocny":null}));
        await db.from("shift_history").insert(histRows);
        cells.forEach(({person,date})=>onShiftSaved(person.id,date,{person_id:person.id,date,shift_type,night_duty,custom_name:custom_name||null,custom_from:custom_from||null,custom_to:custom_to||null}));
        showToast(`Zapisano ${cells.length} zmian`);
        setEditModal(null);
        clearSelection();
      };

      return(
        <div className="space-y-4">
          {/* Selektor miesiąca */}
          <div className="flex flex-wrap gap-2">
            {allMonths.map(m=>(
              <button key={m.key} onClick={()=>{setActiveMonth(m.key);clearSelection();}}
                className={`px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${activeMonth===m.key?"bg-indigo-700 text-white border-indigo-700":"bg-white text-gray-600 border-gray-200 hover:bg-indigo-50"}`}>
                {m.label}
              </button>
            ))}
          </div>

          {/* Pasek multi-select */}
          {adminMode&&selection.size>0&&(
            <div className="flex items-center gap-3 px-4 py-3 bg-indigo-700 text-white rounded-xl shadow-sm">
              <span className="font-semibold text-sm">Zaznaczono: {selection.size}</span>
              <button onClick={openMultiEdit} className="flex items-center gap-1.5 px-3 py-1.5 bg-white text-indigo-700 rounded-lg text-sm font-semibold hover:bg-indigo-50">
                <Pencil className="w-3.5 h-3.5"/>Edytuj zaznaczone
              </button>
              <button onClick={clearSelection} className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 rounded-lg text-sm font-medium hover:bg-indigo-500">
                <X className="w-3.5 h-3.5"/>Odznacz
              </button>
            </div>
          )}

          <div className="bg-white rounded-xl shadow-sm border border-gray-200">
            <div className="p-4 border-b border-gray-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              <h2 className="text-lg font-semibold text-indigo-900 flex items-center gap-2">
                <CalendarDays className="w-5 h-5 text-indigo-500"/>
                {MONTH_NAMES[cwMonth]} {cwYear}
              </h2>
              <div className="flex items-center gap-3">
                {adminMode&&<span className="hidden md:inline text-xs text-amber-700 bg-amber-50 border border-amber-200 px-2 py-1 rounded-lg">Kliknij komórkę aby zaznaczyć · zaznacz kilka i edytuj razem</span>}
                <div className="flex gap-2">
                  {[{key:"tygodniowo",label:"Tygodniowo"},{key:"dziennie",label:"Dziennie"}].map(v=>(
                    <button key={v.key} onClick={()=>setSubView(v.key)} className={`px-4 py-1.5 rounded-lg text-sm font-medium border transition-colors ${subView===v.key?"bg-indigo-700 text-white border-indigo-700":"bg-white text-gray-600 border-gray-200 hover:bg-gray-50"}`}>{v.label}</button>
                  ))}
                </div>
              </div>
            </div>

            {/* Widok tygodniowy */}
            {subView==="tygodniowo"&&(
              <div className="p-4 space-y-3">
                {monthWeeks.length===0&&<div className="text-center py-8 text-gray-400 text-sm">Brak tygodni w tym miesiącu</div>}
                {monthWeeks.map(block=>{
                  const globalIdx=weeklyBlocks.indexOf(block);
                  const isCollapsed=!!cwState[globalIdx];
                  const isCurrent=globalIdx===currentWeekIdx;
                  const isSelWeek=selectionWeek===globalIdx;
                  return(
                    <div key={globalIdx} className={`border rounded-xl overflow-hidden ${isCurrent?"border-indigo-400 shadow-sm":isSelWeek?"border-amber-400":"border-gray-200"}`}>
                      <button onClick={()=>setCollapsedWeeks(prev=>({...(prev||cwState),[globalIdx]:!((prev||cwState)[globalIdx])}))}
                        className={`w-full flex items-center justify-between px-5 py-3 text-left ${isCurrent?"bg-indigo-50 hover:bg-indigo-100":isSelWeek?"bg-amber-50 hover:bg-amber-100":"bg-gray-50 hover:bg-gray-100"}`}>
                        <span className={`font-semibold flex items-center gap-2 ${isCurrent?"text-indigo-700":isSelWeek?"text-amber-800":"text-indigo-900"}`}>
                          <CalendarDays className="w-4 h-4 text-indigo-400"/>
                          {formatDate(block.weekStart)} – {formatDate(block.weekEnd)}
                          {isCurrent&&<span className="text-xs font-normal bg-indigo-700 text-white px-2 py-0.5 rounded-full">aktualny</span>}
                          {isSelWeek&&selection.size>0&&<span className="text-xs font-normal bg-amber-500 text-white px-2 py-0.5 rounded-full">{selection.size} zaznaczonych</span>}
                        </span>
                        <ChevronDown className={`w-4 h-4 text-gray-400 transition-transform ${isCollapsed?"":"rotate-180"}`}/>
                      </button>
                      {!isCollapsed&&(
                        <div className="overflow-x-auto p-2 md:p-4">
                          <table className="w-full min-w-[700px] border-collapse text-sm">
                            <thead>
                              <tr>
                                <th className="p-2 md:p-3 text-left bg-gray-50 border border-gray-200 sticky left-0 z-10 min-w-[100px] md:min-w-[130px]">Pracownik</th>
                                {block.days.map(date=>{

                                            ${isSelected?"ring-2 ring-indigo-500 ring-offset-1 border-indigo-400 shadow-md":cell.style}

                          </table>
                        </div>
                      )}
                    </div>

                            <div key={person.id} onClick={()=>{if(adminMode){setEditModal({cells:[{person,date:selectedDay}],currentShift:raw||null});}}}

                              <div className="flex items-center gap-2 mb-2">
                                <div className="w-7 h-7 rounded-full bg-white/70 border border-current/20 flex items-center justify-center text-xs font-bold">{initials(person.name)}</div>
                                <div className="font-semibold text-sm">{person.name}</div>

                              <div className="text-sm">{cell.content}</div>

                <div className="flex flex-wrap gap-3 text-xs text-gray-500 bg-gray-50 rounded-lg p-3 border border-gray-100">
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-blue-400 inline-block"/>Poranna</span>
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-emerald-400 inline-block"/>Dzienna</span>
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-orange-400 inline-block"/>Popołudniowa</span>
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"/>Nocka</span>
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"/>Dyżur</span>
                  <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-yellow-400 inline-block"/>Urlop</span>
                </div>
              </div>
            )}
          </div>

          {editModal&&(
            <EditShiftModal
              cells={editModal.cells}
              person={editModal.cells[0]?.person}
              date={editModal.cells[0]?.date}
              currentShift={editModal.currentShift}
              onClose={()=>setEditModal(null)}

        </div>
      );

    /* ══════════════════════════════════════════════
       ZAKŁADKA: ROTACJA KWARTALNA
    ══════════════════════════════════════════════ */
    function RotacjaTab({people}){
      const scrollRef=React.useRef(null);
      const scrollBy=dx=>{if(scrollRef.current)scrollRef.current.scrollBy({left:dx,behavior:"smooth"});};

      /* Buduj rotację z legacy_id → kolejność pracowników */
      const peopleByLegacy=React.useMemo(()=>{
        const map={};
        people.forEach((p,i)=>{ map[p.legacy_id||`p${i+1}`]=p; });
        return map;
      },[people]);

      /* Generuj rotację per osoba per tydzień */
      const rotationRows=React.useMemo(()=>{
        return people.map((person,pi)=>{
          const legacyId=person.legacy_id||`p${pi+1}`;
          const weeks=[];
          for(let w=0;w<WEEKS;w++){
            let shift="Dzienna",night=false,weekend=false;
            if(PORANNA_BY_WEEK[w]===legacyId) shift="Poranna";
            else if(NIGHT_BY_WEEK[w]===legacyId){shift="Popołudniowa";night=true;}
            if(WEEKEND_BY_WEEK[w]===legacyId) weekend=true;
            weeks.push({shift,night,weekend});
          }
          return{person,weeks};
        });
      },[people]);

      function getShiftBg(shift,night){
        if(night) return "bg-orange-100 text-orange-900 border-orange-200";
        if(shift==="Poranna") return "bg-blue-100 text-blue-800 border-blue-200";
        if(shift==="Dzienna") return "bg-emerald-100 text-emerald-800 border-emerald-200";
        if(shift==="Popołudniowa") return "bg-orange-50 text-orange-800 border-orange-200";
        return "bg-gray-100 text-gray-700 border-gray-200";
      }

      /* Daty tygodni */
      const weekDates=React.useMemo(()=>{
        return Array.from({length:WEEKS},(_,i)=>{
          const ws=addDays(SCHEDULE_START,i*7);
          return{start:ws,end:addDays(ws,6)};
        });
      },[]);

      /* Statystyki bilansu */
      const stats=rotationRows.map(({person,weeks})=>({
        name:person.name,
        poranna:weeks.filter(w=>w.shift==="Poranna").length,
        dzienna:weeks.filter(w=>w.shift==="Dzienna").length,
        popoludniowa:weeks.filter(w=>w.shift==="Popołudniowa"&&!w.night).length,
        nocki:weeks.filter(w=>w.night).length,
        weekendy:weeks.filter(w=>w.weekend).length,
      }));

      return(
        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-4">
              <h2 className="text-xl font-semibold flex items-center gap-2"><CalendarDays className="w-6 h-6 text-gray-400"/> Harmonogram (13 tygodni)</h2>
              <div className="flex items-center gap-2">
                <button onClick={()=>scrollBy(-380)} className="text-sm px-2.5 py-1.5 rounded-md border bg-white hover:bg-gray-50 text-gray-700 inline-flex items-center gap-1">← W lewo</button>
                <button onClick={()=>scrollBy(380)}  className="text-sm px-2.5 py-1.5 rounded-md border bg-white hover:bg-gray-50 text-gray-700 inline-flex items-center gap-1">W prawo →</button>
              </div>
            </div>
            <div ref={scrollRef} className="border border-gray-200 rounded-xl overflow-x-auto bg-white">
              <table className="w-full text-left border-separate min-w-max" style={{borderSpacing:0}}>
                <thead>
                  <tr>
                    <th className="p-4 bg-gray-50 font-semibold border-b border-r border-gray-200 sticky left-0 z-20">Pracownik</th>
                    {weekDates.map((wd,i)=>(
                      <th key={i} className="p-3 bg-gray-50 border-b border-gray-200 font-semibold text-center text-xs" style={{width:170,minWidth:170}}>
                        <div>Tydz. {i+1}</div>
                        <div className="font-normal text-gray-400 mt-0.5">{formatDate(wd.start).slice(0,5)}–{formatDate(wd.end).slice(0,5)}</div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rotationRows.map(({person,weeks})=>(
                    <tr key={person.id} className="group hover:bg-gray-50/50">
                      <td className="p-4 bg-white font-medium border-b border-r border-gray-100 sticky left-0 z-10 group-hover:bg-gray-50">
                        <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-xs font-bold text-indigo-700">{initials(person.name)}</div>
                          {person.name}
                        </div>
                      </td>
                      {weeks.map((w,wIdx)=>(
                        <td key={wIdx} className="p-2 border-b border-gray-100 align-top" style={{width:170,minWidth:170}}>
                          <div className={`p-2.5 rounded-lg border text-sm text-center flex flex-col gap-1 ${getShiftBg(w.shift,w.night)}`}>
                            <span className="font-semibold">{w.shift}</span>
                            <div className="flex flex-wrap gap-1 justify-center">
                              {w.night&&<span className="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] border bg-orange-100 border-orange-200 text-orange-900"><PhoneCall className="w-2.5 h-2.5 mr-0.5"/> Nocki</span>}
                              {w.weekend&&<span className="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] border bg-red-100 border-red-200 text-red-800"><PhoneCall className="w-2.5 h-2.5 mr-0.5"/> Weekend</span>}
                            </div>
                          </div>
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Bilans */}
            <div className="mt-6 bg-gray-50 border border-gray-200 rounded-xl p-4">
              <div className="flex items-center gap-2 text-gray-800 font-semibold mb-3"><BarChart3 className="w-5 h-5 text-gray-500"/> Tabela Sprawiedliwości (Bilans 13 tyg.)</div>
              <div className="overflow-x-auto">
                <table className="w-full min-w-[600px] text-sm border-collapse">
                  <thead><tr className="bg-white">
                    <th className="text-left p-2 border-b border-gray-200">Pracownik</th>
                    <th className="text-center p-2 border-b border-gray-200 text-blue-700">Poranna</th>
                    <th className="text-center p-2 border-b border-gray-200 text-emerald-700">Dzienna</th>
                    <th className="text-center p-2 border-b border-gray-200 text-orange-700">Popołudniowa</th>
                    <th className="text-center p-2 border-b border-gray-200 bg-gray-50">Nocki</th>
                    <th className="text-center p-2 border-b border-gray-200 bg-gray-50">Weekendy</th>
                  </tr></thead>
                  <tbody>
                    {stats.map(s=>(
                      <tr key={s.name} className="border-b border-gray-100">
                        <td className="p-2 font-medium">{s.name}</td>
                        <td className="p-2 text-center font-semibold text-blue-700">{s.poranna}</td>
                        <td className="p-2 text-center font-semibold text-emerald-700">{s.dzienna}</td>
                        <td className="p-2 text-center font-semibold text-orange-700">{s.popoludniowa}</td>
                        <td className="p-2 text-center bg-gray-50/50 font-medium text-orange-700">{s.nocki}</td>
                        <td className="p-2 text-center bg-gray-50/50 font-medium text-red-700">{s.weekendy}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       ZAKŁADKA: PRACA NA CYPRZE
    ══════════════════════════════════════════════ */
    function CyprTab({people,cyprusMap,setCyprusMap,onRefresh,adminMode}){
      const[editDay,setEditDay]=React.useState(null);
      const[copiedDay,setCopiedDay]=React.useState(null);
      const[toast,setToast]=React.useState(null);
      const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);};

      const cyprMonths=[];
      for(let m=4;m<=5;m++){
        const firstDay=new Date(2026,m,1),lastDay=new Date(2026,m+1,0),gridStart=startOfWeek(firstDay);
        const cells=[];
        for(let d=new Date(gridStart);d<=lastDay||toDayIndex(d)!==0;d=addDays(d,1)) cells.push(new Date(d));
        while(cells.length%7!==0) cells.push(addDays(cells[cells.length-1],1));
        cyprMonths.push({label:MONTH_NAMES[m]+" 2026",firstDay,lastDay,cells});
      }

      const personColor=(personId)=>{
        const idx=people.findIndex(p=>p.id===personId);
        const colors=["bg-blue-100 text-blue-800 border-blue-300","bg-emerald-100 text-emerald-800 border-emerald-300","bg-orange-100 text-orange-900 border-orange-300","bg-violet-100 text-violet-900 border-violet-300","bg-pink-100 text-pink-800 border-pink-300"];
        return colors[idx%colors.length]||"bg-gray-100 text-gray-800 border-gray-300";
      };

      /* Modal edycji Cypru */
      const CyprusEditModal=({dk,entries:initEntries,onClose})=>{
        const[entries,setEntries]=React.useState(initEntries.map(e=>({...e})));
        const[newPersonId,setNewPersonId]=React.useState(people[0]?.id||"");
        const[newFrom,setNewFrom]=React.useState("");
        const[newTo,setNewTo]=React.useState("");
        const[saving,setSaving]=React.useState(false);

        const addEntry=()=>{if(!newPersonId)return;setEntries(prev=>[...prev,{person_id:newPersonId,shift_from:newFrom||null,shift_to:newTo||null}]);setNewFrom("");setNewTo("");};
        const removeEntry=idx=>setEntries(prev=>prev.filter((_,i)=>i!==idx));

        const handleSave=async()=>{
          setSaving(true);
          await db.from("cyprus_shifts").delete().eq("date",dk);
          if(entries.length>0){
            const rows=entries.map(e=>({person_id:e.person_id,date:dk,shift_from:e.shift_from||null,shift_to:e.shift_to||null}));
            const{error}=await db.from("cyprus_shifts").insert(rows);
            if(error){setSaving(false);showToast("Błąd zapisu: "+error.message,false);return;}
          }
          setCyprusMap(prev=>({...prev,[dk]:entries.length>0?entries.map(e=>({...e,date:dk})):[]}));
          setSaving(false);showToast("Cypr zapisany ☀️");onClose();
        };

        const dateObj=new Date(dk);
        return(
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={onClose}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden" onClick={e=>e.stopPropagation()}>
              <div className="bg-gradient-to-r from-cyan-600 to-blue-600 px-6 py-4 flex items-center justify-between">
                <div><div className="text-white font-bold text-lg">Praca na Cyprze</div><div className="text-cyan-200 text-sm">{DAYS_OF_WEEK[toDayIndex(dateObj)]}, {formatDate(dateObj)}</div></div>
                <button onClick={onClose} className="text-cyan-200 hover:text-white"><X className="w-6 h-6"/></button>
              </div>
              <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
                {entries.length>0&&(
                  <div className="space-y-2">
                    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Przypisani pracownicy</div>
                    {entries.map((entry,i)=>{
                      const person=people.find(p=>p.id===entry.person_id);
                      return(
                        <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-xl border ${personColor(entry.person_id)}`}>
                          <div className="flex items-center gap-2">
                            <div className="w-7 h-7 rounded-full bg-white/60 flex items-center justify-center text-xs font-bold">{initials(person?.name||"?")}</div>
                            <span className="font-semibold text-sm">{person?.name||"?"}</span>
                          </div>
                          <div className="flex items-center gap-3">
                            {entry.shift_from&&entry.shift_to?<span className="text-xs font-mono opacity-80">{entry.shift_from?.slice(0,5)} – {entry.shift_to?.slice(0,5)}</span>:<span className="text-xs opacity-60 italic">bez godzin</span>}
                            <button onClick={()=>removeEntry(i)} className="text-red-400 hover:text-red-600"><X className="w-4 h-4"/></button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="bg-gray-50 rounded-xl border border-gray-200 p-4 space-y-3">
                  <div className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Dodaj pracownika</div>
                  <select value={newPersonId} onChange={e=>setNewPersonId(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-400">
                    {people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  <div className="flex gap-3">
                    <div className="flex-1"><label className="text-xs text-gray-500 block mb-1">Od</label><input type="time" value={newFrom} onChange={e=>setNewFrom(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-400"/></div>
                    <div className="flex-1"><label className="text-xs text-gray-500 block mb-1">Do</label><input type="time" value={newTo} onChange={e=>setNewTo(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-400"/></div>
                  </div>
                  <button onClick={addEntry} className="w-full py-2 rounded-xl bg-cyan-600 text-white text-sm font-semibold hover:bg-cyan-700 flex items-center justify-center gap-2"><Plus className="w-4 h-4"/> Dodaj</button>
                </div>
              </div>
              <div className="px-6 pb-6 flex gap-3">
                <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Anuluj</button>
                <button onClick={handleSave} disabled={saving} className="flex-1 py-2.5 rounded-xl bg-cyan-600 text-white font-semibold hover:bg-cyan-700 disabled:opacity-60 flex items-center justify-center gap-2">
                  {saving?<div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>:<Check className="w-4 h-4"/>}Zapisz
                </button>
              </div>
            </div>
          </div>
        );
      };

      return(
        <div className="space-y-6">

            <h2 className="text-xl font-bold text-cyan-900 flex items-center gap-2 mb-1">
